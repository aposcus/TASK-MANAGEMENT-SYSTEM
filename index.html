<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZONE — Task Management</title>
  <meta name="description" content="ZONE — A modern, Google-inspired task management board.">
  <meta name="google-signin-client_id"
    content="992901954610-iib1ta0af0mqmq0r10jbud71j61t25vk.apps.googleusercontent.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

  <!-- ===== AMBIENT MESH GRADIENT ===== -->
  <div class="mesh-bg" aria-hidden="true">
    <div class="mesh-orb mesh-orb--blue"></div>
    <div class="mesh-orb mesh-orb--red"></div>
    <div class="mesh-orb mesh-orb--yellow"></div>
    <div class="mesh-orb mesh-orb--green"></div>
  </div>

  <style>
    :root {
      --g-blue: #4285F4;
      --g-red: #EA4335;
      --g-yellow: #FBBC04;
      --g-green: #34A853;
      --g-blue-light: #aecbfa;
      --g-red-light: #f6aea8;
      --g-yellow-light: #fde293;
      --g-green-light: #a8dab5;
      --g-blue-dark: #1a73e8;
      --g-purple: #a142f4;
      --bg: #f6f8fa;
      --surface: #ffffff;
      --text-primary: #24292f;
      --text-secondary: #57606a;
      --text-tertiary: #8c959f;
      --border: #d0d7de;
      --border-light: #e1e4e8;
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(208, 215, 222, 0.4);
      --glass-shadow: 0 4px 12px rgba(31, 35, 40, 0.04);
      --card-shadow: 0 1px 3px rgba(31, 35, 40, 0.12), 0 1px 2px rgba(31, 35, 40, 0.08);
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      --ease-out: cubic-bezier(0, 0, 0.2, 1);
      --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1)
    }

    body.dark-mode {
      --bg: #0d1117;
      --surface: #161b22;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --text-tertiary: #6e7681;
      --border: #30363d;
      --border-light: #21262d;
      --glass-bg: rgba(22, 27, 34, 0.85);
      --glass-border: rgba(48, 54, 61, 0.5);
      --glass-shadow: 0 8px 32px rgba(1, 4, 9, 0.5);
      --card-shadow: none
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background .4s, color .4s;
      -webkit-font-smoothing: antialiased
    }

    /* ══ AMBIENT MESH GRADIENT BACKGROUND ══ */
    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none
    }

    .mesh-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      -webkit-filter: blur(120px);
      will-change: transform;
      mix-blend-mode: normal
    }

    /* Light mode: 10-12% opacity */
    .mesh-orb--blue {
      width: 55vmax;
      height: 55vmax;
      background: radial-gradient(circle, #4285F4 0%, transparent 70%);
      opacity: .12;
      top: -15%;
      left: -10%;
      animation: orbFloat1 22s var(--ease-in-out) infinite alternate
    }

    .mesh-orb--red {
      width: 45vmax;
      height: 45vmax;
      background: radial-gradient(circle, #EA4335 0%, transparent 70%);
      opacity: .10;
      bottom: -10%;
      right: -8%;
      animation: orbFloat2 26s var(--ease-in-out) infinite alternate
    }

    .mesh-orb--yellow {
      width: 40vmax;
      height: 40vmax;
      background: radial-gradient(circle, #FBBC05 0%, transparent 70%);
      opacity: .10;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: orbFloat3 20s var(--ease-in-out) infinite alternate
    }

    .mesh-orb--green {
      width: 50vmax;
      height: 50vmax;
      background: radial-gradient(circle, #34A853 0%, transparent 70%);
      opacity: .11;
      top: -5%;
      right: -15%;
      animation: orbFloat4 24s var(--ease-in-out) infinite alternate
    }

    /* Dark mode: softer, deeper presence */
    body.dark-mode .mesh-orb--blue {
      opacity: .08
    }

    body.dark-mode .mesh-orb--red {
      opacity: .07
    }

    body.dark-mode .mesh-orb--yellow {
      opacity: .06
    }

    body.dark-mode .mesh-orb--green {
      opacity: .07
    }

    @keyframes orbFloat1 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      25% {
        transform: translate(8vw, 12vh) scale(1.05)
      }

      50% {
        transform: translate(15vw, 5vh) scale(.95)
      }

      75% {
        transform: translate(5vw, 18vh) scale(1.08)
      }

      100% {
        transform: translate(12vw, 8vh) scale(1)
      }
    }

    @keyframes orbFloat2 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      25% {
        transform: translate(-10vw, -8vh) scale(1.06)
      }

      50% {
        transform: translate(-5vw, -15vh) scale(.92)
      }

      75% {
        transform: translate(-12vw, -5vh) scale(1.04)
      }

      100% {
        transform: translate(-8vw, -12vh) scale(.97)
      }
    }

    @keyframes orbFloat3 {
      0% {
        transform: translate(-50%, -50%) scale(1)
      }

      33% {
        transform: translate(-40%, -60%) scale(1.1)
      }

      66% {
        transform: translate(-60%, -40%) scale(.9)
      }

      100% {
        transform: translate(-50%, -50%) scale(1.05)
      }
    }

    @keyframes orbFloat4 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      30% {
        transform: translate(-12vw, 10vh) scale(1.07)
      }

      60% {
        transform: translate(-6vw, 18vh) scale(.94)
      }

      100% {
        transform: translate(-10vw, 6vh) scale(1.02)
      }
    }

    /* ── INTRO ── */
    /* ── APP ── */
    .app {
      display: block;
      min-height: 100vh;
      position: relative;
      z-index: 1
    }

    @keyframes appIn {
      to {
        opacity: 1
      }
    }

    @keyframes appIn {
      to {
        opacity: 1
      }
    }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 28px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border-light);
      transition: background .3s, border .3s
    }

    .nav-brand {
      display: flex;
      align-items: center;
      cursor: pointer
    }

    .zone-logo {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--border-light);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      width: 34px;
      height: 34px;
      overflow: hidden;
      transition: transform .3s
    }

    .zone-logo:hover {
      transform: scale(1.05)
    }

    .z-cell {
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: .75rem;
      font-weight: 900;
      color: var(--text-primary);
      transition: all .3s
    }

    .zone-logo:hover .c-blue {
      background: rgba(66, 133, 244, .15);
      color: var(--g-blue)
    }

    .zone-logo:hover .c-red {
      background: rgba(234, 67, 53, .15);
      color: var(--g-red)
    }

    .zone-logo:hover .c-yellow {
      background: rgba(251, 188, 4, .15);
      color: #d97008
    }

    .zone-logo:hover .c-green {
      background: rgba(52, 168, 83, .15);
      color: var(--g-green)
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1rem;
      transition: all .2s
    }

    .nav-btn:hover {
      background: var(--border-light);
      color: var(--text-primary)
    }

    .btn-add-task {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      border: none;
      border-radius: 22px;
      background: var(--g-blue);
      color: #fff;
      font-family: var(--font-body);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(66, 133, 244, .3);
      transition: all .25s
    }

    .btn-add-task:hover {
      background: var(--g-blue-dark);
      transform: translateY(-1px);
      box-shadow: 0 5px 18px rgba(66, 133, 244, .4)
    }

    .btn-add-task i {
      font-size: .8rem
    }

    /* ── PROFILE / AUTH ── */
    .profile-area {
      position: relative
    }

    .btn-signin {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border: 1.5px solid var(--g-blue);
      border-radius: 22px;
      background: transparent;
      color: var(--g-blue);
      font-family: var(--font-body);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s
    }

    .btn-signin:hover {
      background: var(--g-blue);
      color: #fff
    }

    .avatar-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--g-blue);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: .9rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--g-blue), var(--g-purple));
      transition: transform .2s, box-shadow .2s;
      overflow: hidden
    }

    .avatar-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 16px rgba(66, 133, 244, .4)
    }

    .avatar-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .profile-dropdown {
      position: absolute;
      top: 48px;
      right: 0;
      width: 280px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      box-shadow: 0 12px 48px rgba(0, 0, 0, .15);
      padding: 20px;
      opacity: 0;
      transform: translateY(-8px) scale(.96);
      pointer-events: none;
      transition: all .2s var(--ease-out);
      z-index: 120
    }

    .profile-dropdown.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all
    }

    body.dark-mode .profile-dropdown {
      box-shadow: 0 12px 48px rgba(0, 0, 0, .4)
    }

    .pd-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border-light)
    }

    .pd-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--g-blue), var(--g-purple));
      flex-shrink: 0
    }

    .pd-info {
      overflow: hidden
    }

    .pd-name {
      font-weight: 600;
      font-size: .95rem;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .pd-email {
      font-size: .78rem;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .pd-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center
    }

    .pd-btn-logout {
      background: rgba(234, 67, 53, .08);
      color: var(--g-red);
      margin-top: 4px
    }

    .pd-btn-logout:hover {
      background: var(--g-red);
      color: #fff
    }

    /* ── DASHBOARD TOOLBAR ── */
    .dashboard-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1400px;
      margin: 24px auto 16px;
      padding: 0 28px;
      gap: 16px
    }

    .dt-left {
      font-family: var(--font-display);
      font-size: .9rem;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: 0.5px
    }

    .dt-left span {
      color: var(--text-primary)
    }

    .dt-center {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(52, 168, 83, .1);
      border: 1px solid rgba(52, 168, 83, .2);
      color: var(--g-green);
      font-size: .8rem;
      font-weight: 600;
      white-space: nowrap
    }

    .dt-center i {
      font-size: .85rem
    }

    .dt-right {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .dt-search {
      position: relative
    }

    .dt-search i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      font-size: .85rem;
      pointer-events: none
    }

    .dt-search input {
      width: 220px;
      padding: 8px 12px 8px 34px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: .85rem;
      transition: all .2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px)
    }

    .dt-search input:focus {
      outline: none;
      border-color: var(--g-blue);
      box-shadow: 0 0 0 3px rgba(66, 133, 244, .15)
    }

    body.dark-mode .dt-search input {
      background: rgba(0, 0, 0, .2)
    }

    /* ── BOARD ── */
    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 22px;
      padding: 0 28px 36px;
      max-width: 1400px;
      margin: 0 auto
    }

    .column {
      background: var(--glass-bg);
      backdrop-filter: blur(14px) saturate(160%);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      padding: 22px;
      box-shadow: var(--glass-shadow);
      transition: transform .3s, box-shadow .3s;
      min-height: 400px;
      display: flex;
      flex-direction: column
    }

    .column:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 36px rgba(0, 0, 0, .1)
    }

    body.dark-mode .column:hover {
      box-shadow: 0 10px 36px rgba(0, 0, 0, .3)
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      padding-bottom: 12px
    }

    .column-info {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .column-indicator {
      width: 4px;
      height: 26px;
      border-radius: 4px
    }

    .col-todo .column-indicator {
      background: var(--g-blue)
    }

    .col-progress .column-indicator {
      background: var(--g-yellow)
    }

    .col-done .column-indicator {
      background: var(--g-green)
    }

    .column-name {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600
    }

    .column-count {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      padding: 0 7px;
      border-radius: 12px;
      font-size: .75rem;
      font-weight: 700;
      color: #fff
    }

    .col-todo .column-count {
      background: var(--g-blue)
    }

    .col-progress .column-count {
      background: var(--g-yellow);
      color: #202124
    }

    .col-done .column-count {
      background: var(--g-green)
    }

    .column-add {
      width: 30px;
      height: 30px;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      background: none;
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: .9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s
    }

    .column-add:hover {
      border-color: var(--g-blue);
      color: var(--g-blue);
      background: rgba(66, 133, 244, .06)
    }

    .tasks-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 60px;
      position: relative
    }

    /* ── TASK CARDS ── */
    .task-card {
      position: relative !important;
      height: auto !important;
      top: auto !important;
      left: auto !important;
      margin: 0 !important;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 14px;
      padding: 16px 18px;
      cursor: pointer;
      transition: all .25s var(--ease-out);
      overflow: hidden;
      box-sizing: border-box;
      box-shadow: var(--card-shadow)
    }

    .task-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0
    }

    .col-todo .task-card::before {
      background: linear-gradient(90deg, var(--g-blue), var(--g-blue-light))
    }

    .col-progress .task-card::before {
      background: linear-gradient(90deg, var(--g-yellow), var(--g-yellow-light))
    }

    .col-done .task-card::before {
      background: linear-gradient(90deg, var(--g-green), var(--g-green-light))
    }

    .task-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(31, 35, 40, 0.15);
      border-color: var(--g-blue-light)
    }

    body.dark-mode .task-card:hover {
      box-shadow: 0 12px 32px rgba(1, 4, 9, 0.9);
      border-color: rgba(66, 133, 244, 0.4)
    }

    .task-card.dragging {
      opacity: 0.3;
      transform: scale(0.96);
      border: 2px dashed var(--g-blue);
      box-shadow: none !important
    }

    .task-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 6px
    }

    .task-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      flex: 1
    }

    .task-menu {
      display: flex;
      gap: 3px;
      margin-left: 6px
    }

    .task-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: .8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s
    }

    .task-btn:hover {
      background: rgba(66, 133, 244, .1);
      color: var(--g-blue)
    }

    .task-btn.delete:hover {
      background: rgba(234, 67, 53, .1);
      color: var(--g-red)
    }

    .task-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 12px
    }

    .task-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid var(--border-light)
    }

    .task-date {
      font-size: .75rem;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 4px
    }

    .task-date i {
      font-size: .68rem
    }

    .task-priority {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      padding: 4px 10px;
      border-radius: 24px;
      border: none !important
    }

    .priority-high {
      background: rgba(234, 67, 53, .15);
      color: var(--g-red)
    }

    .priority-medium {
      background: rgba(251, 188, 4, .15);
      color: #d97008
    }

    /* darker orange for contrast against the yellow background */
    .priority-low {
      background: rgba(52, 168, 83, .15);
      color: var(--g-green)
    }

    .column.drag-over {
      border: 2px dashed var(--g-blue);
      background: rgba(66, 133, 244, .04)
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      flex: 1;
      display: flex;

    // Called by GIS after a successful sign-in
    function handleGoogleCredential(response) {
      console.log('[ZONE Google] Credential response received:', response);

      if (!response || !response.credential) {
        console.error('[ZONE Google] ERROR: No credential in response object:', response);
        toast('Google Sign-In failed — no credential returned.', 'error');
        return;
      }

      try {
        // Decode JWT payload (base64url → JSON)
        const parts = response.credential.split('.');
        console.log('[ZONE Google] JWT parts count:', parts.length);
        // Pad base64url and decode safely
        let base64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
        while (base64.length % 4) base64 += '=';
        const payload = JSON.parse(atob(base64));
        console.log('[ZONE Google] Decoded JWT payload:', payload);

        const username = payload.name || payload.given_name || payload.email.split('@')[0];
        const email = payload.email;
        const picture = payload.picture || null;

        if (!email) {
          console.error('[ZONE Google] ERROR: No email in payload:', payload);
          toast('Google Sign-In failed — could not read email.', 'error');
          return;
        }

        // Register/update user in local store
        const users = getUsers();
        if (!users.find(u => u.email === email)) {
          users.push({ username, email, password: '__google__', picture });
          saveUsers(users);
          console.log('[ZONE Google] New user registered:', email);

          console.log('[ZONE Google] Existing user found:', email);

        currentUser = { username, email, picture };

            } else {

            }
          });
        }

        renderProfile();
        closeAuth();
        toast(`Welcome, ${username}! 🎉`, 'success');

      } catch (err) {
        console.error('[ZONE Google] EXCEPTION in handleGoogleCredential:', err);
        console.error('[ZONE Google] Stack:', err.stack);
        toast('Google Sign-In failed. Check console for details.', 'error');
      }
    }

    function initGoogleSignIn() {

    function taskCard(t) {
      const date = new Date(t.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return `<div class="task-card" draggable="true" data-id="${t.id}"><div class="task-card-header"><div class="task-title">${t.title}</div><div class="task-menu"><button class="task-btn edit-btn" data-id="${t.id}" title="Edit"><i class="fas fa-pen"></i></button><button class="task-btn delete task-del-btn" data-id="${t.id}" title="Delete"><i class="fas fa-trash-can"></i></button></div></div>${t.description ? `<div class="task-desc">${t.description}</div>` : ''}<div class="task-footer"><div class="task-date"><i class="far fa-calendar"></i> ${date}</div><span class="task-priority priority-${t.priority}">${t.priority}</span></div></div>`;
    }

    let dragClone = null;
    let lastX = 0;
    let dragVelocity = 0;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    function setupDrag() {
      // Ensure GSAP is loaded
      if (typeof window.gsap === 'undefined') {
        setTimeout(setupDrag, 100);
        return;
      }

      $$('.task-card').forEach(c => {
        // ── Tactile Button Press ──
        c.addEventListener('mousedown', () => gsap.to(c, { scale: 0.97, duration: 0.15 }));
        c.addEventListener('mouseup', () => gsap.to(c, { scale: 1, duration: 0.2, clearProps: "scale" }));
        c.addEventListener('mouseleave', () => gsap.to(c, { scale: 1, duration: 0.2, clearProps: "scale" }));

        // ── Start High-Fidelity Drag ──
        c.addEventListener('dragstart', e => {
          c.classList.add('dragging');
          // Hide OS Ghost
          const blankImg = new Image();
          blankImg.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
          e.dataTransfer.setDragImage(blankImg, 0, 0);

          const rect = c.getBoundingClientRect();
          dragOffsetX = e.clientX - rect.left;
          dragOffsetY = e.clientY - rect.top;
          lastX = e.clientX;

          // Create Custom Physics Clone
          dragClone = c.cloneNode(true);
          dragClone.classList.remove('dragging');
          dragClone.style.position = 'fixed';
          dragClone.style.top = '0px';
          dragClone.style.left = '0px';
          dragClone.style.width = rect.width + 'px';
          dragClone.style.height = rect.height + 'px';
          dragClone.style.zIndex = '9999';
          dragClone.style.pointerEvents = 'none';
          dragClone.style.margin = '0';
          // 3D perspective setup
          dragClone.style.transformStyle = 'preserve-3d';
          dragClone.style.transition = 'none';

          document.body.appendChild(dragClone);

          gsap.set(dragClone, {
            x: rect.left,
            y: rect.top,
            scale: 1,
            boxShadow: document.body.classList.contains('dark-mode') ? '0 8px 24px rgba(0,0,0,0.2)' : '0 4px 12px rgba(0,0,0,0.1)'
          });

          // Lift off effect
          gsap.to(dragClone, {
            scale: 1.05,
            boxShadow: document.body.classList.contains('dark-mode') ? '0 30px 60px rgba(0,0,0,0.6)' : '0 30px 60px rgba(66,133,244,0.18)',
            duration: 0.3,
            ease: 'power3.out'
          });
        });

        // ── Velocity-Based 3D Skew During Drag ──
        c.addEventListener('drag', e => {
          if (!dragClone || e.clientX === 0) return;
          const x = e.clientX - dragOffsetX;
          const y = e.clientY - dragOffsetY;

          const dx = e.clientX - lastX;
          lastX = e.clientX;
          dragVelocity = dragVelocity * 0.8 + dx * 0.2;

          const tilt = Math.max(-25, Math.min(25, dragVelocity * 1.5));

          gsap.to(dragClone, {
            x: x,
            y: y,
            rotateZ: tilt * 0.08,
            rotateY: tilt,
            duration: 0.1,
            ease: "none"
          });
        });

        // ── Drop with Spring Physics ──
        c.addEventListener('dragend', () => {
          c.classList.remove('dragging');
          $$('.column').forEach(x => x.classList.remove('drag-over'));

          const id = c.dataset.id;
          // Wait for DOM to update from 'drop' event
          requestAnimationFrame(() => {
            const targetCard = document.querySelector(`.task-card[data-id="${id}"]`);
            if (targetCard && dragClone) {
              const finalRect = targetCard.getBoundingClientRect();

              targetCard.style.opacity = '0'; // Hide real card temporarily

              gsap.to(dragClone, {
                x: finalRect.left,
                y: finalRect.top,
                rotateY: 0,
                rotateZ: 0,
                scale: 1,
                boxShadow: '0 8px 24px rgba(0,0,0,0)',
                duration: 0.7,
                ease: "elastic.out(1, 0.6)", // spring effect
                onComplete: () => {
                  if (dragClone) dragClone.remove();
                  dragClone = null;
                  targetCard.style.opacity = '1';
                  targetCard.style.removeProperty('opacity');
                }
              });
            } else {
              if (dragClone) dragClone.remove();
              dragClone = null;
            }
          });
        });
      });

      // Native Drop Zones
      $$('.tasks-container').forEach(ct => {
        ct.addEventListener('dragover', e => {
          e.preventDefault();
          ct.closest('.column').classList.add('drag-over');
          const d = document.querySelector('.dragging');
          if (!d) return;
          const a = getAfter(ct, e.clientY);
          if (a) {
            if (a !== d.nextSibling) ct.insertBefore(d, a);
          } else {
            if (ct.lastChild !== d) ct.appendChild(d);
          }
        });
        ct.addEventListener('dragleave', e => {
          if (!ct.contains(e.relatedTarget)) ct.closest('.column').classList.remove('drag-over');
        });
        ct.addEventListener('drop', e => {
          e.preventDefault();
          ct.closest('.column').classList.remove('drag-over');
          const d = document.querySelector('.dragging');
          if (!d) return;

          const draggedId = d.dataset.id;
          // Update status
          tasks = tasks.map(t => t.id === draggedId ? { ...t, status: ct.dataset.column } : t);

          // Re-sync array order flawlessly based on current DOM to prevent duplicates or overlapping
          const allDomCards = Array.from(document.querySelectorAll('.task-card'));
          const newTasksOrder = [];
          const usedIds = new Set();

          // 1. Add them in their new DOM order
          allDomCards.forEach(card => {
            const id = card.dataset.id;
            if (!usedIds.has(id)) {
              const match = tasks.find(x => x.id === id);
              if (match) {
                newTasksOrder.push(match);
                usedIds.add(id);
              }
            }
          });
          // 2. Fallback for any tasks missing from DOM
          tasks.forEach(t => {
            if (!usedIds.has(t.id)) newTasksOrder.push(t);
          });

          tasks = newTasksOrder;
          save();
          render();
        });
      });
    }
    function getAfter(ct, y) { const els = [...ct.querySelectorAll('.task-card:not(.dragging)')]; return els.reduce((cl, el) => { const b = el.getBoundingClientRect(); const o = y - b.top - b.height / 2; return o < 0 && o > cl.offset ? { offset: o, element: el } : cl }, { offset: -Infinity }).element }

    // ── Task Modal ──
    function openModal(defaultStatus = 'todo', taskId = null) {
      if (taskId) { const t = tasks.find(x => x.id === taskId); if (!t) return; modalTitle.textContent = 'Edit Task'; titleInput.value = t.title; descInput.value = t.description || ''; idInput.value = t.id; editingId = t.id; const r = document.querySelector(`input[name="priority"][value="${t.priority}"]`); if (r) r.checked = true; delBtn.style.display = 'block' }
      else { modalTitle.textContent = 'New Task'; form.reset(); idInput.value = ''; editingId = null; $('#p-medium').checked = true; delBtn.style.display = 'none' }
      modal.dataset.status = defaultStatus; modal.classList.add('active'); setTimeout(() => titleInput.focus(), 100);
    }
    function closeModal() { modal.classList.remove('active'); editingId = null }
    $('#closeModal').addEventListener('click', closeModal);
    $('#cancelTask').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal() });
    $('#addTaskBtn').addEventListener('click', () => openModal());

    form.addEventListener('submit', e => {
      e.preventDefault(); const title = titleInput.value.trim(), desc = descInput.value.trim(), priority = document.querySelector('input[name="priority"]:checked').value; if (!title) return;
      if (editingId) tasks = tasks.map(t => t.id === editingId ? { ...t, title, description: desc, priority } : t);
      else {
        const uniqueKey = 'task_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 6);
        tasks.push({ id: uniqueKey, title, description: desc, priority, status: modal.dataset.status || 'todo', createdAt: new Date().toISOString() });
      }
      save(); render(); closeModal();
    });
    delBtn.addEventListener('click', async () => {
      if (editingId) {
        tasks = tasks.filter(t => t.id !== editingId);
        if (currentUser && supabaseClient) await supabaseClient.from('tasks').delete().eq('id', editingId);
        save(); render(); closeModal();
      }
    });
    board.addEventListener('click', async e => {
      const eb = e.target.closest('.edit-btn'), db = e.target.closest('.task-del-btn');
      if (eb) openModal(null, eb.dataset.id);
      if (db) {
        const id = db.dataset.id;
        tasks = tasks.filter(t => t.id !== id);
        if (currentUser && supabaseClient) await supabaseClient.from('tasks').delete().eq('id', id);
        save(); render();
      }
    });

    async function save() {
      localStorage.setItem('zone-tasks', JSON.stringify(tasks));
      if (currentUser && supabaseClient && tasks.length > 0) {
        const upsertData = tasks.map(t => ({
          id: t.id,
          title: t.title,
          description: t.description,
          status: t.status,
          priority: t.priority,
          user_email: currentUser.email,
          created_at: t.createdAt
        }));
        await supabaseClient.from('tasks').upsert(upsertData);
      }
    }
  </script>
</body>
